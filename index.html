<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE PARTY</title>
</head>
<body style="background:#000; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column;">
    
    <h1>PARTİ YÜKLENİYOR...</h1>
    
    <audio id="audio" loop>
        <source src="1.mp3" type="audio/mpeg">
    </audio>

    <button id="btn" style="padding:20px; font-size:20px;">GİRİŞ YAP</button>

    <script>
        document.getElementById('btn').onclick = function() {
            var a = document.getElementById('audio');
            a.currentTime = 16;
            a.play();
            alert("Müzik başladı, kod çalışıyor kanka!");
        };
    </script>
</body>
</html>
